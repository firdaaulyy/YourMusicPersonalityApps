<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourMusic-Based Personality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mouse-glow"></div>
    <div class="container">
        <header>
            <h1>YourMusic<span class="green"> Personality</span></h1>
            <p>Discover your inner self through your Spotify rhythm.</p>
        </header>

        <main>
            <button id="analyzeBtn">Connect & Analyze My Soul</button>

            <div id="resultArea" class="hidden">
                <div class="card">
                    <h3>Now Listening</h3>
                <div id="spotifyPlayer"></div> 
            </div>

                <div class="card tracks">
                    <h3>Your Recent Favorites</h3>
                    <ul id="trackList"></ul>
                </div>

                <div class="card analysis">
                    <h3>AI Psychological Insight</h3>
                    <p id="analysisContent"></p>
                </div>
            </div>
        </main>

        <footer>
            <p>Belum punya footer</p>
        </footer>
    </div>
    <script src="js/effect.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
